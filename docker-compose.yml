services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_WS_URL: ""
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      # Не задавайте CHROMA_HOST пустым — Chroma HttpClient падает (нет http://).
      # В Docker без отдельного сервиса chromadb в .env можно не указывать CHROMA_HOST
      # или оставить localhost: тогда backend/load_docs уйдут в PersistentClient на томе.
      - CHROMA_DATA_DIR=/app/chroma_data
      - GOOGLE_SHEETS_CREDENTIALS_FILE=/app/credentials/google_service_account.json
    volumes:
      - ./chroma_data:/app/chroma_data
      - ./logs:/app/logs
      - ./docs:/app/docs:ro
      - ./parsing_agent/data/raw:/app/parsing_raw:ro
      - ./credentials:/app/credentials:ro
    restart: unless-stopped
    mem_limit: 400m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  chroma_data:
