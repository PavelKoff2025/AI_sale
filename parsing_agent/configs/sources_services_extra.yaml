# Дополнительные услуги (электрика, канализация) — локальные MD в RAG.
# Запуск: cd parsing_agent && python -m app.main --config configs/sources_services_extra.yaml

sources:
  - name: "Электрика"
    type: "markdown"
    path: "data/raw/services/elektrika.md"
    category: "elektrika"
    company_name: "ГК Проект"

  - name: "Канализация"
    type: "markdown"
    path: "data/raw/services/kanalizatsiya.md"
    category: "kanalizatsiya"
    company_name: "ГК Проект"

settings:
  delay_seconds: 1.0
  timeout: 90
  user_agent: "GKProject-AI-Parser/1.0"
  max_retries: 3
